<!doctype html>
<html lang="es">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eunoia — Control de Envíos</title>

  <meta name="theme-color" content="#0D0D0D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Eunoia Envíos">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&amp;family=DM+Sans:wght@300;400;500;700&amp;display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --black: #0D0D0D; --orange: #E2622A; --orange-light: rgba(226,98,42,0.12);
      --bg: #FAF7F2; --white: #FFFFFF; --gray: #F2EEE8; --gray2: #E8E3DB;
      --text: #1a1a1a; --muted: #8a8278; --green: #27ae60; --red: #e74c3c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; min-height: 100vh; }

    header {
      background: var(--black); padding: 14px 20px 11px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 3px solid var(--orange); position: sticky; top: 0; z-index: 200;
    }
    .header-logo { flex: 1; text-align: center; }
    .logo-text { font-family: 'Cormorant Garamond', serif; font-size: 21px; font-weight: 700; color: white; letter-spacing: 3px; text-transform: uppercase; }
    .logo-sub { font-size: 8px; color: var(--orange); letter-spacing: 2px; text-transform: uppercase; display: block; text-align: center; margin-top: -2px; }

    /* CAMPANA */
    .bell-btn {
      background: none; border: none; cursor: pointer; padding: 6px; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .bell-icon { font-size: 20px; filter: grayscale(0.3); transition: transform 0.2s; }
    .bell-btn:hover .bell-icon { transform: rotate(-15deg); }
    .bell-dot {
      position: absolute; top: 4px; right: 4px; width: 9px; height: 9px;
      background: var(--orange); border-radius: 50%; border: 2px solid var(--black);
      display: none;
    }
    .bell-dot.visible { display: block; }
    .notif-status {
      background: rgba(255,255,255,0.06); border-radius: 8px; padding: 8px 12px;
      font-size: 11px; color: #999; text-align: center; margin: 0 16px 14px;
    }
    .notif-status.ok { color: #27ae60; }
    .notif-status.error { color: var(--red); }

    nav { background: var(--black); display: flex; justify-content: space-around; position: sticky; top: 58px; z-index: 100; border-bottom: 1px solid #222; }
    .nav-btn { background: none; border: none; color: #555; padding: 13px 8px 11px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: color 0.2s; position: relative; font-family: 'DM Sans', sans-serif; }
    .nav-btn.active { color: white; }
    .nav-btn.active::after { content:''; position:absolute; bottom:0; left:10%; right:10%; height:2px; background:var(--orange); border-radius:2px 2px 0 0; }

    .panel { display: none; padding: 16px; max-width: 500px; margin: auto; }
    .panel.active { display: block; }

    .section-title { font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:600; color:var(--black); margin-bottom:16px; padding-bottom:10px; border-bottom:1px solid var(--gray2); display:flex; align-items:center; gap:8px; }
    .section-title span { color: var(--orange); }

    .card { background:var(--white); border-radius:14px; padding:16px; margin-bottom:12px; border-left:3px solid var(--orange); box-shadow:0 2px 12px rgba(0,0,0,0.06); animation:fadeIn 0.25s ease both; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none} }

    .card-label { color:var(--orange); font-weight:700; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:3px; }
    .guia-badge { background:var(--gray); color:var(--muted); font-size:10px; font-weight:600; padding:3px 8px; border-radius:20px; }
    .card-info { font-size:11px; color:var(--muted); margin-bottom:10px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }

    .edit-input { width:100%; border:none; border-bottom:1px solid var(--gray2); background:transparent; margin-bottom:10px; font-size:16px; outline:none; font-family:'DM Sans',sans-serif; color:var(--text); padding:4px 0; transition:border-color 0.2s; }
    .edit-input:focus { border-color:var(--orange); }

    .file-wrap { background:white; border:1.5px dashed var(--gray2); border-radius:12px; padding:20px; text-align:center; margin-bottom:16px; cursor:pointer; transition:border-color 0.2s; }
    .file-wrap:hover { border-color:var(--orange); }
    .file-wrap input { display:none; }
    .file-icon { font-size:28px; margin-bottom:6px; }
    .file-text { font-size:13px; color:var(--muted); font-weight:500; }
    .file-name { font-size:12px; color:var(--orange); font-weight:700; margin-top:6px; min-height:16px; }

    .btn { width:100%; border:none; padding:13px; border-radius:10px; font-weight:700; font-size:12px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; font-family:'DM Sans',sans-serif; transition:opacity 0.2s,transform 0.1s; margin-bottom:8px; }
    .btn:active { transform:scale(0.98); opacity:0.85; }
    .btn:last-child { margin-bottom:0; }
    .btn-black { background:var(--black); color:white; }
    .btn-wa { background:#25D366; color:white; }
    .btn-green { background:var(--green); color:white; }
    .btn-red { background:var(--red); color:white; }
    .btn-gray { background:var(--gray); color:var(--muted); }
    .btn-limpiar { width:100%; background:transparent; color:var(--muted); border:1px solid var(--gray2); padding:10px; border-radius:10px; font-weight:700; font-size:11px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; margin-bottom:14px; font-family:'DM Sans',sans-serif; }

    .progress-wrap { margin:10px 0 12px; }
    .progress-label { display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-bottom:5px; font-weight:600; }
    .progress-bg { background:var(--gray); height:7px; border-radius:4px; overflow:hidden; }
    .progress-fill { background:linear-gradient(90deg,var(--orange),#f0843c); height:100%; border-radius:4px; transition:width 0.4s ease; }

    .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:10px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; }
    .badge-camino { background:var(--orange-light); color:var(--orange); }
    .badge-entregado { background:rgba(39,174,96,0.12); color:var(--green); }
    .badge-no { background:rgba(231,76,60,0.12); color:var(--red); }

    .motivo-box { background:var(--gray); padding:10px; border-radius:10px; margin-top:4px; display:none; }
    .motivo-box.visible { display:block; animation:fadeIn 0.2s ease; }
    .motivo-input { width:100%; border:1.5px solid var(--gray2); background:white; border-radius:8px; padding:8px 10px; font-size:12px; outline:none; font-family:'DM Sans',sans-serif; margin-bottom:8px; transition:border-color 0.2s; }
    .motivo-input:focus { border-color:var(--red); }

    .dia-chip { display:inline-block; background:var(--orange); color:white; font-size:10px; font-weight:700; padding:3px 10px; border-radius:20px; margin-bottom:6px; }
    .msg-preview { background:var(--gray); border-radius:8px; padding:8px 10px; font-size:11px; color:var(--muted); margin-bottom:10px; line-height:1.5; font-style:italic; }

    .filtro-wrap { display:flex; gap:8px; margin-bottom:14px; overflow-x:auto; padding-bottom:4px; }
    .filtro-btn { background:var(--gray); color:var(--muted); border:none; padding:7px 14px; border-radius:20px; font-size:11px; font-weight:700; cursor:pointer; white-space:nowrap; font-family:'DM Sans',sans-serif; transition:all 0.2s; }
    .filtro-btn.active { background:var(--orange); color:white; }
    .motivo-tag { background:rgba(231,76,60,0.08); color:var(--red); font-size:11px; padding:5px 10px; border-radius:6px; margin-top:6px; display:block; }
    .fecha-text { font-size:10px; color:var(--muted); }
    .divider { border:none; border-top:1px solid var(--gray2); margin:12px 0; }

    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .stat-box { background:white; border-radius:12px; padding:14px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.05); border-top:3px solid var(--orange); }
    .stat-box.green { border-top-color:var(--green); }
    .stat-num { font-family:'Cormorant Garamond',serif; font-size:32px; font-weight:700; color:var(--orange); line-height:1; }
    .stat-label { font-size:10px; color:var(--muted); font-weight:600; letter-spacing:1px; margin-top:4px; text-transform:uppercase; }
    .chart-wrap { background:white; border-radius:14px; padding:16px; margin-bottom:14px; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
    .chart-title { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:600; margin-bottom:12px; color:var(--black); }

    .empty-state { text-align:center; padding:40px 20px; color:var(--muted); }
    .empty-icon { font-size:40px; margin-bottom:10px; }
    .empty-text { font-size:14px; font-weight:500; }

    /* BOX FULL TRACKING TIMELINE */
    .bf-wrap { margin:12px 0 8px; }
    .bf-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .bf-title { font-size:10px; font-weight:700; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; }
    .bf-refresh { background:none; border:none; cursor:pointer; font-size:13px; padding:2px 6px; border-radius:6px; color:var(--muted); transition:color 0.2s; }
    .bf-refresh:hover { color:var(--orange); }
    .bf-timeline { display:flex; flex-direction:column; gap:0; }
    .bf-step { display:flex; align-items:flex-start; gap:10px; padding:8px 0; position:relative; }
    .bf-step:not(:last-child)::after { content:''; position:absolute; left:12px; top:28px; bottom:-8px; width:2px; background:var(--gray2); }
    .bf-step.done::after { background:var(--orange); opacity:0.4; }
    .bf-dot { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
    .bf-dot.done { background:#2563eb; }
    .bf-dot.pending { background:#d1d5db; }
    .bf-dot svg { width:13px; height:13px; fill:white; }
    .bf-info { flex:1; }
    .bf-step-title { font-weight:700; font-size:13px; color:var(--black); }
    .bf-step-title.pending { color:#9ca3af; font-weight:500; }
    .bf-step-date { font-size:11px; color:var(--muted); margin-top:1px; }
    .bf-loading { text-align:center; padding:14px; color:var(--muted); font-size:12px; }
    .bf-error { font-size:11px; color:var(--red); padding:6px 0; }
    .bf-link { font-size:10px; color:var(--orange); text-decoration:none; font-weight:700; letter-spacing:0.5px; }

    /* PANEL NOTIFICACIONES */
    .notif-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .notif-overlay.open { opacity: 1; pointer-events: all; }
    .notif-panel {
      position: fixed; top: 0; right: 0; width: 92%; max-width: 380px; height: 100vh;
      background: var(--white); z-index: 1000; transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column;
      box-shadow: -4px 0 30px rgba(0,0,0,0.15);
    }
    .notif-panel.open { transform: translateX(0); }
    .notif-panel-header {
      background: var(--black); padding: 16px 18px; display: flex;
      align-items: center; justify-content: space-between;
      border-bottom: 3px solid var(--orange); flex-shrink: 0;
    }
    .notif-panel-title {
      font-family: 'Cormorant Garamond', serif; font-size: 20px;
      font-weight: 700; color: white; letter-spacing: 1px;
    }
    .notif-close {
      background: none; border: none; color: #888; font-size: 22px;
      cursor: pointer; padding: 2px 6px; border-radius: 6px; transition: color 0.2s;
    }
    .notif-close:hover { color: white; }
    .notif-count {
      font-size: 11px; color: var(--orange); font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; padding: 8px 18px 4px;
      flex-shrink: 0;
    }
    .notif-list { flex: 1; overflow-y: auto; padding: 8px 12px 20px; }
    .notif-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 12px; border-radius: 12px; margin-bottom: 6px;
      background: var(--bg); cursor: pointer; transition: background 0.2s;
      border: 1px solid transparent; animation: fadeIn 0.2s ease both;
    }
    .notif-item:hover { background: var(--gray); border-color: var(--gray2); }
    .notif-item:active { transform: scale(0.98); }
    .notif-avatar {
      width: 44px; height: 44px; border-radius: 50%; background: var(--orange);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 700;
      color: white; flex-shrink: 0;
    }
    .notif-info { flex: 1; min-width: 0; }
    .notif-name { font-weight: 700; font-size: 14px; color: var(--black); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .notif-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .notif-dia {
      background: var(--orange-light); color: var(--orange);
      font-size: 10px; font-weight: 700; padding: 3px 8px;
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .notif-empty { text-align: center; padding: 50px 20px; color: var(--muted); }
    .notif-empty-icon { font-size: 36px; margin-bottom: 10px; }
    .notif-empty-text { font-size: 13px; font-weight: 500; }
  </style>
  <script>
    const CONFIG = {
      apiKey: "AIzaSyCK6G6h0UzSLO2e57PZHbxUEOS2hAfnwbU",
      authDomain: "eunoia-shop-hn.firebaseapp.com",
      projectId: "eunoia-shop-hn",
      storageBucket: "eunoia-shop-hn.firebasestorage.app",
      messagingSenderId: "91297264195",
      appId: "1:91297264195:web:4f1b742a2b8ccb0f82daf6"
    };
    if (!firebase.apps.length) firebase.initializeApp(CONFIG);
    const db = firebase.firestore();
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let temp = [], ventasChart = null, historialFiltro = 'todos';
    let swReg = null, timerManana = null, timerTarde = null;
    const EXCLUIR = ["89268080","96610202","22029400","22640024","20222024"];
    const TRACKING = "https://tracking.goboxful.com?shipment=";

    // ── PANEL NOTIFICACIONES INBOX ────────────────────────
    let panelAbierto = false;

    function toggleNotifPanel() {
      if (!panelAbierto) {
        abrirNotifPanel();
      } else {
        cerrarNotifPanel();
      }
    }

    async function abrirNotifPanel() {
      panelAbierto = true;
      document.getElementById('notif-overlay').classList.add('open');
      document.getElementById('notif-panel').classList.add('open');
      await cargarNotifPanel();
    }

    function cerrarNotifPanel() {
      panelAbierto = false;
      document.getElementById('notif-overlay').classList.remove('open');
      document.getElementById('notif-panel').classList.remove('open');
    }

    async function cargarNotifPanel() {
      const listEl = document.getElementById('notif-panel-list');
      const countEl = document.getElementById('notif-panel-count');
      listEl.innerHTML = `<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px;">Cargando...</div>`;
      const snap = await db.collection("pedidos").where("estado","==","En Camino").get();
      if (snap.empty) {
        countEl.textContent = 'Sin envíos pendientes';
        listEl.innerHTML = `<div class="notif-empty"><div class="notif-empty-icon">📭</div><div class="notif-empty-text">No hay envíos en camino</div></div>`;
        return;
      }
      const docs = snap.docs.sort((a,b) => (a.data().fecha||0) - (b.data().fecha||0));
      countEl.textContent = `${docs.length} envío${docs.length!==1?'s':''} en camino`;
      listEl.innerHTML = docs.map(doc => {
        const p = doc.data();
        const dia = p.diaSeguimiento || 1;
        const inicial = p.nombre.charAt(0).toUpperCase();
        const fechaStr = p.fecha ? new Date(p.fecha).toLocaleDateString('es-HN',{day:'2-digit',month:'short'}) : '';
        const guiaT = p.guiaTracking || p.guia;
        return `
        <div class="notif-item" onclick="enviarDesdePanel('${p.telefono}','${p.nombre}',${dia},'${doc.id}','${guiaT}')">
          <div class="notif-avatar">${inicial}</div>
          <div class="notif-info">
            <div class="notif-name">${p.nombre}</div>
            <div class="notif-desc">📦 ${p.guia} · ${fechaStr}</div>
          </div>
          <span class="notif-dia">Día ${dia}</span>
        </div>`;
      }).join('');
    }

    async function enviarDesdePanel(tel, nom, dia, id, guiaT) {
      const msg = getMensaje(dia, nom, guiaT);
      const nextDia = Math.min(dia + 1, 12);
      await db.collection("pedidos").doc(id).update({ diaSeguimiento: nextDia });
      window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank');
      cerrarNotifPanel();
      // Actualizar el panel después de enviar
      setTimeout(() => { if (panelAbierto) cargarNotifPanel(); }, 500);
    }
    async function registrarSW() {
      if (!('serviceWorker' in navigator)) return;
      try {
        swReg = await navigator.serviceWorker.register('sw.js');
        navigator.serviceWorker.addEventListener('message', e => {
          if (e.data?.type === 'GO_SEGUIMIENTO') irA('p-s');
        });
      } catch(e) { console.log('SW no disponible:', e); }
    }

    // ── NOTIFICACIONES ────────────────────────────────────
    async function iniciarNotificaciones() {
      const statusEl = document.getElementById('notif-status');
      statusEl.style.display = 'block';
      if (!('Notification' in window)) {
        statusEl.textContent = '⚠ Tu navegador no soporta notificaciones';
        statusEl.className = 'notif-status error'; return;
      }
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') {
        statusEl.textContent = '🔕 Permiso denegado. Actívalo en ajustes del navegador.';
        statusEl.className = 'notif-status error';
        document.getElementById('bell-dot').classList.remove('visible'); return;
      }
      statusEl.textContent = '🔔 Activo — recordatorios a las 9:00 AM y 2:30 PM';
      statusEl.className = 'notif-status ok';
      document.getElementById('bell-dot').classList.add('visible');
      localStorage.setItem('notif_activas', '1');
      setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
      programarAmbas();
    }

    function programarAmbas() {
      programarTurno('manana', 9, 0);
      programarTurno('tarde', 14, 30);
      programarTurno('urgentes', 10, 0);
    }

    function programarTurno(turno, hora, min) {
      // Honduras = UTC-6
      const ahora = new Date();
      const objetivo = new Date(ahora);
      objetivo.setHours(hora, min, 0, 0);
      if (ahora >= objetivo) objetivo.setDate(objetivo.getDate() + 1);
      const ms = objetivo - ahora;
      const timer = setTimeout(async () => {
        await dispararNotif(turno);
        setInterval(() => dispararNotif(turno), 24 * 60 * 60 * 1000);
      }, ms);
      if (turno === 'manana') timerManana = timer;
      else timerTarde = timer;
    }

    async function dispararNotif(turno) {
      if (Notification.permission !== 'granted') return;
      const snap = await db.collection("pedidos").where("estado","==","En Camino").get();
      if (snap.empty) return;

      if (turno === 'urgentes') {
        // Ordenar por fecha más antigua primero
        const docs = snap.docs.sort((a,b) => (a.data().fecha||0) - (b.data().fecha||0));
        const count = docs.length;
        const masViejo = docs[0].data();
        const diasViejo = Math.floor((Date.now() - (masViejo.fecha||0)) / 86400000);
        const lines = docs.slice(0,3).map(d => {
          const p = d.data();
          const dias = Math.floor((Date.now() - (p.fecha||0)) / 86400000);
          return `${p.nombre.split(' ')[0]} — ${dias} día${dias!==1?'s':''}`;
        }).join('\n');
        const n = new Notification(`🚨 Eunoia Shop — ${count} en camino`, {
          body: lines + (count > 3 ? `\n...y ${count-3} más` : ''),
          tag: 'urgentes', renotify: true
        });
        n.onclick = () => { window.focus(); irA('p-s'); n.close(); };
        return;
      }

      const nombres = snap.docs.map(d => d.data().nombre.split(' ')[0]);
      const count = nombres.length;
      if (swReg?.active) {
        swReg.active.postMessage({ type: 'NOTIF', nombres, count, turno });
      } else {
        const hora = turno === 'manana' ? '9:00 AM' : '2:30 PM';
        const body = count === 1 ? `Escríbele a ${nombres[0]}` : `${nombres.slice(0,2).join(', ')}${count>2?` y ${count-2} más`:''}`;
        const n = new Notification(`Eunoia Shop 📦 — ${count} pendiente${count!==1?'s':''}`, {
          body: body + ` (${hora})`, tag: 'seg-'+turno, renotify: true
        });
        n.onclick = () => { window.focus(); irA('p-s'); n.close(); };
      }
    }

    // ── MENSAJES DÍA A DÍA ───────────────────────────────
    function getMensaje(dia, nombre, guia) {
      const link = TRACKING + guia;
      const n = nombre.split(' ')[0];
      const nc = n.charAt(0).toUpperCase() + n.slice(1).toLowerCase();
      const msgs = [
        // Día 0 — despacho (único con link, se envía desde Despacho)
        `¡Buen día ${nc}! 👋 Le saluda *Eunoia Shop*. Su pedido ya fue despachado con guía *${guia}*.\n\nPuede rastrear su paquete aquí:\n${link}\n\nEstaremos pendientes. 🛍️`,
        // Día 1
        `¡Buen día ${nc}! Somos de *Eunoia Shop*, ¿ya le entregaron su paquete?`,
        // Día 2
        `¡Buen día ${nc}! Le escribe *Eunoia Shop*, ¿ya le llamaron de la transportista para coordinar su entrega?`,
        // Día 3
        `¡Buen día ${nc}! Somos de *Eunoia Shop*, ¿tiene alguna novedad sobre su pedido?`,
        // Día 4
        `¡Buen día ${nc}! Le contacta *Eunoia Shop*, ¿ya tiene su paquete en mano?`,
        // Día 5
        `¡Buen día ${nc}! *Eunoia Shop* al habla, ¿ya pasaron a dejarle su pedido?`,
        // Día 6
        `¡Buen día ${nc}! Somos de *Eunoia Shop*, ¿hubo algún inconveniente con la entrega de su paquete?`,
        // Día 7
        `¡Buen día ${nc}! Le escribe *Eunoia Shop*, ¿le han dado alguna fecha para la entrega de su pedido?`,
        // Día 8
        `¡Buen día ${nc}! *Eunoia Shop* nuevamente, ¿pudieron comunicarse con usted de la transportista?`,
        // Día 9
        `¡Buen día ${nc}! Somos de *Eunoia Shop*, ¿su pedido ya llegó a sus manos?`,
        // Día 10
        `¡Buen día ${nc}! Le contacta *Eunoia Shop*, ¿tiene alguna novedad o necesita que le ayudemos con algo?`,
        // Día 11
        `¡Buen día ${nc}! *Eunoia Shop* al habla, ¿ya recibió su paquete o aún está pendiente?`,
        // Día 12
        `¡Buen día ${nc}! Somos de *Eunoia Shop*, este es nuestro último seguimiento. ¿Ya recibió su pedido? Si no es así, por favor avísenos para ayudarle. 🧡`
      ];
      return msgs[Math.min(dia, 12)];
    }

    // ── PDF ───────────────────────────────────────────────
    async function leerPDF(f) {
      if (!f) return;
      document.getElementById('file-name').textContent = f.name;
      const r = new FileReader();
      r.onload = async function() {
        const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
        temp = [];
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          const items = content.items.map(s => s.str.trim()).filter(s => s !== "");
          const fullText = items.join(' ');
          let guia = fullText.match(/(BH\d{7,15}(?:-\d)?|FD\d{7,15}(?:-\d)?)/i)?.[0] || "S/G";
          let guiaTracking = guia;
          let nom = "CLIENTE", tel = "";
          if (guia.toUpperCase().startsWith("BH")) {
            guiaTracking = guia;
            let idxDest = items.findIndex(t => /^destinatario\s*:?\s*$/i.test(t));
            if (idxDest !== -1 && idxDest >= 3) nom = items[idxDest - 3] || "CLIENTE";
            const EXCLUIR_BH = ["89268080","96610202","22029400","22640024","20222024","26204706"];
            const guiaDigits = guia.replace(/\D/g,'');
            const todosNum = [...fullText.matchAll(/(\d{8,})/g)].map(m => m[1]);
            tel = todosNum.find(n => {
              if (EXCLUIR_BH.some(ex => ex === n.slice(-8))) return false;
              if (guiaDigits.includes(n)) return false;
              return true;
            })?.slice(-8) || "";
          } else {
            guiaTracking = guia.replace(/-\d$/, '');
            let idxTel = items.findIndex(t => t.includes("Tel.:") && !EXCLUIR.some(e => t.includes(e)));
            if (idxTel !== -1) {
              nom = items[idxTel - 1];
              let matchTel = items[idxTel].match(/\d{8,}/);
              if (matchTel) tel = matchTel[0].slice(-8);
            }
          }
          // Extraer servicio (COD/STD) y contenido
          let servicio = '';
          let contenido = '';
          if (guia.toUpperCase().startsWith("FD")) {
            const svcMatch = fullText.match(/Servicio\s+(COD|STD|EXP|DOM|[A-Z]{2,6})/i);
            if (svcMatch) servicio = svcMatch[1].toUpperCase();
            const contMatch = fullText.match(/Contenido:\s*([^\n\r]{3,60}?)(?=\s*Ref:|\s*Forma Pago|\s*$)/i);
            if (contMatch) contenido = contMatch[1].trim();
          } else if (guia.toUpperCase().startsWith("BH")) {
            if (/\bCOD\b/.test(fullText)) servicio = 'COD';
            else if (/\bSTD\b/.test(fullText)) servicio = 'STD';
          }
          if (guia !== "S/G") temp.push({ nom: nom.toUpperCase(), tel, guia, guiaTracking, servicio, contenido });
        }
        renderDespacho();
      };
      r.readAsArrayBuffer(f);
    }

    function renderDespacho() {
      const list = document.getElementById('list-c');
      if (temp.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">📄</div><div class="empty-text">No se encontraron guías</div></div>`;
        return;
      }
      // Pendientes primero, enviadas al final
      const ordenados = [...temp.map((p,i) => ({...p, _i:i}))].sort((a,b) => {
        if (a.enviada && !b.enviada) return 1;
        if (!a.enviada && b.enviada) return -1;
        return 0;
      });
      const pendientes = ordenados.filter(p => !p.enviada).length;
      list.innerHTML = `<button class="btn-limpiar" onclick="temp=[];document.getElementById('file-name').textContent='';renderDespacho()">✕ Limpiar vista previa</button>` +
        (pendientes < ordenados.length ? `<div style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:10px;font-weight:600;">${pendientes} pendiente${pendientes!==1?'s':''} · ${ordenados.length - pendientes} enviada${(ordenados.length-pendientes)!==1?'s':''}</div>` : '') +
        ordenados.map((p) => `
          <div class="card" style="${p.enviada ? 'opacity:0.6;border-left-color:var(--green);' : ''}">
            ${p.enviada ? '<div style="font-size:10px;color:var(--green);font-weight:700;margin-bottom:8px;">✓ Enviada</div>' : ''}
            <div class="card-label">Cliente</div>
            <input type="text" id="n-${p._i}" value="${p.nom}" class="edit-input" style="font-weight:700;font-size:18px;" ${p.enviada ? 'disabled' : ''}>
            <div class="card-label">WhatsApp</div>
            <input type="text" id="t-${p._i}" value="${p.tel}" class="edit-input" style="color:#25D366;font-size:15px;" ${p.enviada ? 'disabled' : ''}>
            <div class="card-info">
              <span class="guia-badge">${p.guia}</span>
              ${p.servicio ? `<span class="badge ${p.servicio==='COD'?'badge-no':'badge-camino'}" style="font-size:10px;">${p.servicio}</span>` : ''}
            </div>
            ${p.contenido ? `<div style="font-size:11px;color:var(--muted);margin-bottom:10px;">📦 ${p.contenido}</div>` : ''}
            ${!p.enviada ? `<button class="btn btn-black" onclick="guardarEnvio(${p._i})">📦 Registrar y enviar guía</button>` : ''}
          </div>`).join('');
    }

    async function guardarEnvio(i) {
      const n = document.getElementById(`n-${i}`).value.trim();
      const t = document.getElementById(`t-${i}`).value.trim();
      if (!t) { alert("Ingresa el número de WhatsApp antes de registrar."); return; }
      const telFull = t.startsWith("504") ? t : "504" + t;
      const guia = temp[i].guia, guiaTracking = temp[i].guiaTracking;
      const msg = getMensaje(0, n, guiaTracking);
      await db.collection("pedidos").add({
        nombre: n.toUpperCase(), telefono: telFull, guia, guiaTracking,
        servicio: temp[i].servicio || '', contenido: temp[i].contenido || '',
        diaSeguimiento: 1, fecha: Date.now(), estado: 'En Camino',
        enviadoHoy: false
      });
      // Marcar como enviada y re-renderizar
      temp[i].enviada = true;
      renderDespacho();
      window.open(`https://wa.me/${telFull}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    // ── BOX FULL TRACKING ─────────────────────────────────
    async function cargarBoxFull(guiaTracking, containerId, docId) {
      const el = document.getElementById(containerId);
      if (!el) return;
      el.innerHTML = `<div class="bf-loading">⏳ Consultando Box Full...</div>`;
      try {
        const res = await fetch(`/.netlify/functions/boxful?shipment=${guiaTracking}`);
        const data = await res.json();
        if (!res.ok || !data.steps || data.steps.length === 0) {
          el.innerHTML = `<div class="bf-error">No se pudo obtener estado. <a class="bf-link" href="https://tracking.goboxful.com?shipment=${guiaTracking}" target="_blank">Ver en Box Full →</a></div>`;
          return;
        }
        // Actualizar badge con último estado completado de Box Full
        if (docId) {
          const badge = document.getElementById(`badge-${docId}`);
          if (badge) {
            const completados = data.steps.filter(s => s.done);
            if (completados.length > 0) {
              const ultimo = completados[completados.length - 1];
              badge.textContent = ultimo.title;
              if (/entregado/i.test(ultimo.title)) {
                badge.className = 'badge badge-entregado';
              } else if (/ruta/i.test(ultimo.title)) {
                badge.style.cssText = '';
                badge.className = 'badge';
                badge.style.background = 'rgba(37,99,235,0.12)';
                badge.style.color = '#2563eb';
              } else {
                badge.className = 'badge badge-camino';
              }
            }
          }
        }
        el.innerHTML = renderBoxFullTimeline(data.steps, guiaTracking, data.fechaEstimada, data.paqueteria);
      } catch(e) {
        el.innerHTML = `<div class="bf-error">Sin conexión con Box Full. <a class="bf-link" href="https://tracking.goboxful.com?shipment=${guiaTracking}" target="_blank">Ver aquí →</a></div>`;
      }
    }

    function renderBoxFullTimeline(steps, guiaTracking, fechaEstimada, paqueteria) {
      const svgArrow = `<svg viewBox="0 0 24 24"><path d="M12 4v12M6 11l6 6 6-6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`;
      const svgCheck = `<svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`;
      const metaHtml = (fechaEstimada || paqueteria) ? `
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
          ${paqueteria ? `<div style="background:rgba(37,99,235,0.08);border-radius:8px;padding:6px 10px;font-size:11px;display:flex;align-items:center;gap:5px;"><span style="font-size:16px;">🚚</span><span style="font-weight:700;color:#2563eb;">${paqueteria}</span></div>` : ''}
          ${fechaEstimada ? `<div style="background:rgba(226,98,42,0.1);border-radius:8px;padding:6px 10px;font-size:11px;"><span style="color:var(--muted);font-weight:600;display:block;">📅 Entrega estimada</span><span style="font-weight:700;color:var(--orange);">${fechaEstimada}</span></div>` : ''}
        </div>` : '';
      const stepsHtml = steps.map(s => {
        const isEntregado = /entregado/i.test(s.title);
        const icon = (s.done && isEntregado) ? svgCheck : svgArrow;
        return `
        <div class="bf-step ${s.done ? 'done' : 'pending'}">
          <div class="bf-dot ${s.done ? 'done' : 'pending'}" style="${s.done && isEntregado ? 'background:#27ae60;' : ''}">${icon}</div>
          <div class="bf-info">
            <div class="bf-step-title ${s.done ? '' : 'pending'}">${s.title}</div>
            <div class="bf-step-date">${s.date}</div>
          </div>
        </div>`;
      }).join('');
      return `
        ${metaHtml}
        <div class="bf-timeline">${stepsHtml}</div>
        <div style="margin-top:8px;">
          <a class="bf-link" href="https://tracking.goboxful.com?shipment=${guiaTracking}" target="_blank">↗ Ver en Box Full</a>
        </div>`;
    }

    // ── SEGUIMIENTO ───────────────────────────────────────
    function cargarSeguimiento() {
      db.collection("pedidos").where("estado","==","En Camino").onSnapshot(async snap => {
        const el = document.getElementById('list-s');
        if (snap.empty) {
          el.innerHTML = `<div class="empty-state"><div class="empty-icon">🚚</div><div class="empty-text">No hay envíos en camino</div></div>`;
          return;
        }
        // Obtener historial para detectar clientes frecuentes
        const histSnap = await db.collection("pedidos").where("estado","in",["Entregado","No Entregado"]).get();
        const nombresHistorial = histSnap.docs.map(d => d.data().nombre.trim().toUpperCase());
        // Ordenar: no enviados hoy primero, enviados hoy al final
        const hoy = new Date().toDateString();
        const docs = snap.docs.map(doc => {
          const d = doc.data();
          // Resetear enviadoHoy si es de otro día
          if (d.enviadoHoy && d.fechaEnvioHoy !== hoy) {
            db.collection("pedidos").doc(doc.id).update({ enviadoHoy: false, fechaEnvioHoy: '' });
          }
          return doc;
        }).sort((a, b) => {
          const aEnv = a.data().enviadoHoy && a.data().fechaEnvioHoy === hoy;
          const bEnv = b.data().enviadoHoy && b.data().fechaEnvioHoy === hoy;
          if (aEnv && !bEnv) return 1;
          if (!aEnv && bEnv) return -1;
          return (a.data().fecha || 0) - (b.data().fecha || 0);
        });
        el.innerHTML = docs.map(doc => {
          const p = doc.data();
          const dia = p.diaSeguimiento || 1;
          const guiaT = p.guiaTracking || p.guia;
          const msgPrev = getMensaje(dia, p.nombre, guiaT);
          const fechaStr = p.fecha ? new Date(p.fecha).toLocaleDateString('es-HN',{day:'2-digit',month:'short'}) : '';
          const pct = Math.round((dia/12)*100);
          const bfId = `bf-${doc.id}`;
          const esFrecuente = nombresHistorial.includes(p.nombre.trim().toUpperCase());
          return `
          <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
              <div>
                <div style="font-weight:700;font-size:17px;">${p.nombre} ${esFrecuente ? '<span title="Cliente frecuente" style="font-size:15px;">⭐</span>' : ''}</div>
                <div class="card-info" style="margin-top:4px;margin-bottom:0;">
                  <span class="guia-badge">${p.guia}</span>
                  ${p.servicio ? `<span class="badge ${p.servicio==='COD'?'badge-no':'badge-camino'}" style="font-size:9px;padding:2px 7px;">${p.servicio}</span>` : ''}
                  <a href="tel:+${p.telefono}" style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);text-decoration:none;">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.22 1.18 2 2 0 012.18 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.09a16 16 0 006 6l.56-.56a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/></svg>
                    ${p.telefono}
                  </a>
                </div>
                ${p.enviadoHoy ? '<div style="font-size:10px;color:var(--green);font-weight:700;margin-top:3px;">✓ Enviado hoy</div>' : ''}
              </div>
              <div style="text-align:right;">
                <span class="badge badge-camino" id="badge-${doc.id}">En camino</span>
                <div class="fecha-text" style="margin-top:4px;">${fechaStr}</div>
              </div>
            </div>
            <div class="bf-wrap">
              <div class="bf-header">
                <span class="bf-title">📦 Estado Box Full</span>
                <button class="bf-refresh" onclick="cargarBoxFull('${guiaT}','${bfId}')" title="Actualizar">↻</button>
              </div>
              <div id="${bfId}"><div class="bf-loading">Cargando...</div></div>
            </div>
            <div class="divider"></div>
            <div class="progress-wrap">
              <div class="progress-label"><span>Seguimiento día ${dia} / 12</span><span>${pct}%</span></div>
              <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
            </div>
            <span class="dia-chip">Mensaje Día ${dia}</span>
            <div class="msg-preview">"${msgPrev.substring(0,130)}${msgPrev.length>130?'…':''}"</div>
            <button class="btn btn-wa" onclick="abrirWA('${p.telefono}','${p.nombre}',${dia},'${doc.id}','${guiaT}')">
              📲 Enviar seguimiento día ${dia}
            </button>
            <button class="btn btn-green" onclick="cambiarEstado('${doc.id}','Entregado')">✓ Marcar entregado</button>
            <button class="btn btn-gray" onclick="toggleMotivo('${doc.id}')">✗ No entregado</button>
            <div class="motivo-box" id="mbox-${doc.id}">
              <input class="motivo-input" id="mot-${doc.id}" placeholder="Escribe el motivo de no entrega...">
              <button class="btn btn-red" style="margin-bottom:0;" onclick="marcarNoEntregado('${doc.id}')">Confirmar no entregado</button>
            </div>
          </div>`;
        }).join('');
        // Cargar Box Full para cada envío
        docs.forEach(doc => {
          const p = doc.data();
          const guiaT = p.guiaTracking || p.guia;
          if (guiaT) cargarBoxFull(guiaT, `bf-${doc.id}`, doc.id);
        });
      });
    }

    // Auto-actualización cada 5 minutos
    setInterval(() => {
      if (document.getElementById('p-s')?.classList.contains('active')) {
        document.querySelectorAll('[id^="bf-"]').forEach(el => {
          const docId = el.id.replace('bf-','');

    // ── HISTORIAL ─────────────────────────────────────────
    function cargarHistorial(filtro) {
      historialFiltro = filtro || historialFiltro;
      document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
      const ab = document.querySelector(`[data-filtro="${historialFiltro}"]`);
      if (ab) ab.classList.add('active');
      let q = db.collection("pedidos");
      if (historialFiltro === 'entregado') q = q.where("estado","==","Entregado");
      else if (historialFiltro === 'no') q = q.where("estado","==","No Entregado");
      else q = q.where("estado","in",["Entregado","No Entregado"]);
      q.onSnapshot(snap => {
        const el = document.getElementById('list-h');
        if (snap.empty) { el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">No hay registros aquí</div></div>`; return; }

                <div class="fecha-text" style="margin-top:4px;">${f}</div>
              </div>
            </div>

          </div>`;
        }).join('');
      });
    }

      await db.collection("pedidos").doc(id).delete();

    // ── VENTAS ────────────────────────────────────────────
    function cargarVentas() {
      db.collection("pedidos").where("estado","==","Entregado").onSnapshot(snap => {
        const ahora = new Date();
        const meses = [];
        for (let i = 5; i >= 0; i--) {
          const d = new Date(ahora.getFullYear(), ahora.getMonth()-i, 1);
          meses.push({ label: d.toLocaleDateString('es-HN',{month:'short',year:'2-digit'}), year:d.getFullYear(), month:d.getMonth(), count:0 });
        }
        snap.docs.forEach(doc => {
          const p = doc.data(), ts = p.fechaCierre || p.fecha;
          if (!ts) return;
          const d = new Date(ts), m = meses.find(x => x.year===d.getFullYear() && x.month===d.getMonth());
          if (m) m.count++;
        });
        const total = snap.size, ma = meses[meses.length-1].count, mb = meses[meses.length-2].count;
        const vari = mb > 0 ? Math.round(((ma-mb)/mb)*100) : (ma > 0 ? 100 : 0);
        document.getElementById('stat-total').textContent = total;
        document.getElementById('stat-mes').textContent = ma;
        const ve = document.getElementById('stat-var');
        ve.textContent = (vari>=0?'+':'')+vari+'%';
        ve.style.color = vari>=0?'var(--green)':'var(--red)';
        const ctx = document.getElementById('ventasChart').getContext('2d');
        if (ventasChart) ventasChart.destroy();
        ventasChart = new Chart(ctx, {
          type:'doughnut', data:{ labels:meses.map(m=>m.label), datasets:[{ data:meses.map(m=>m.count), backgroundColor:['#E2622A','#f0843c','#f5a06e','#f9bea0','#fcd8c4','#fde8db'], borderWidth:2, borderColor:'#FAF7F2' }] },
          options:{ responsive:true, cutout:'62%', plugins:{ legend:{ position:'bottom', labels:{ font:{family:'DM Sans',size:11}, padding:12, color:'#8a8278' } }, tooltip:{ callbacks:{ label:c=>` ${c.label}: ${c.raw} entrega${c.raw!==1?'s':''}` } } } }
        });
        document.getElementById('ventas-list').innerHTML = meses.slice().reverse().map(m => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--gray);">
            <span style="font-weight:600;font-size:13px;text-transform:capitalize;">${m.label}</span>
            <span style="font-weight:700;font-size:20px;color:${m.count>0?'var(--orange)':'var(--muted)'};font-family:'Cormorant Garamond',serif;">${m.count}</span>
          </div>`).join('');
      });
    }

    // ── NAV ───────────────────────────────────────────────
    function irA(id) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      const btn = document.querySelector(`[data-panel="${id}"]`);
      if (btn) btn.classList.add('active');
      if (id==='p-s') cargarSeguimiento();
      if (id==='p-h') cargarHistorial();
      if (id==='p-v') cargarVentas();
    }

    // ── INIT ──────────────────────────────────────────────
    window.addEventListener('load', () => {
      irA('p-c');
      registrarSW();
      if (localStorage.getItem('notif_activas') === '1' && Notification.permission === 'granted') {
        document.getElementById('bell-dot').classList.add('visible');
        const s = document.getElementById('notif-status');
        s.style.display = 'block';
        s.textContent = '🔔 Activo — recordatorios a las 9:00 AM y 2:30 PM';
        s.className = 'notif-status ok';
        setTimeout(() => { s.style.display = 'none'; }, 3000);
        programarAmbas();
      }
    });
  </script>
 </head>
 <body>
  <header>
   <div style="width:36px;"></div>
   <div class="header-logo">
    <div class="logo-text">Eunoia Shop</div>
    <span class="logo-sub">Control de Envíos</span>
   </div>
   <button class="bell-btn" onclick="toggleNotifPanel()" title="Ver pendientes"><span class="bell-icon">🔔</span> <span class="bell-dot" id="bell-dot"></span></button>
  </header>
  <div id="notif-status" class="notif-status" style="display:none;"></div>
  <nav>
   <button class="nav-btn" data-panel="p-c" onclick="irA('p-c')">Despacho</button>
   <button class="nav-btn" data-panel="p-s" onclick="irA('p-s')">Seguimiento</button>
   <button class="nav-btn" data-panel="p-h" onclick="irA('p-h')">Historial</button>
   <button class="nav-btn" data-panel="p-v" onclick="irA('p-v')">Ventas</button>
  </nav>
  <!-- PANEL NOTIFICACIONES -->
  <div class="notif-overlay" id="notif-overlay" onclick="cerrarNotifPanel()"></div>
  <div class="notif-panel" id="notif-panel">
   <div class="notif-panel-header">
    <div class="notif-panel-title">🔔 Pendientes</div>
    <button class="notif-close" onclick="cerrarNotifPanel()">✕</button>
   </div>
   <div class="notif-count" id="notif-panel-count"></div>
   <div class="notif-list" id="notif-panel-list"></div>
   <div style="padding:12px 16px; border-top:1px solid var(--gray2); flex-shrink:0;">
    <button class="btn btn-black" style="font-size:11px; padding:10px; margin-bottom:0;" onclick="iniciarNotificaciones()">⏰ Activar recordatorios 9am y 2:30pm</button>
   </div>
  </div>
  <!-- DESPACHO -->
  <div id="p-c" class="panel active">
   <div class="section-title">
    Despacho <span>✦</span>
   </div>
   <div class="file-wrap" onclick="document.getElementById('pdf-input').click()">
    <input type="file" id="pdf-input" accept=".pdf" onchange="leerPDF(this.files[0])">
    <div class="file-icon">📎</div>
    <div class="file-text">Toca para subir guías PDF</div>
    <div class="file-name" id="file-name"></div>
   </div>
   <div id="list-c"></div>
  </div>
  <!-- SEGUIMIENTO -->
  <div id="p-s" class="panel">
   <div class="section-title">
    Seguimiento <span>✦</span>
   </div>
   <input type="search" id="buscar-s" placeholder="🔍 Buscar cliente o guía..." oninput="filtrarSeguimiento()" class="edit-input" style="margin-bottom:14px;font-size:14px;padding:8px 4px;">
   <div id="list-s"></div>
  </div>
  <!-- HISTORIAL -->
  <div id="p-h" class="panel">
   <div class="section-title">
    Historial <span>✦</span>
   </div>
   <input type="search" id="buscar-h" placeholder="🔍 Buscar cliente o guía..." oninput="filtrarHistorial()" class="edit-input" style="margin-bottom:12px;font-size:14px;padding:8px 4px;">
   <div class="filtro-wrap">
    <button class="filtro-btn active" data-filtro="todos" onclick="cargarHistorial('todos')">Todos</button>
    <button class="filtro-btn" data-filtro="entregado" onclick="cargarHistorial('entregado')">Entregados</button>
    <button class="filtro-btn" data-filtro="no" onclick="cargarHistorial('no')">No entregados</button>
   </div>
   <div id="list-h"></div>
  </div>
  <!-- VENTAS -->
  <div id="p-v" class="panel">
   <div class="section-title">
    Ventas <span>✦</span>
   </div>
   <div class="stat-grid">
    <div class="stat-box">
     <div class="stat-num" id="stat-total">—</div>
     <div class="stat-label">Total entregas</div>
    </div>
    <div class="stat-box">
     <div class="stat-num" id="stat-mes">—</div>
     <div class="stat-label">Este mes</div>
    </div>
   </div>
   <div class="stat-grid" style="grid-template-columns:1fr;">
    <div class="stat-box green">
     <div class="stat-num" id="stat-var" style="font-size:24px;">—</div>
     <div class="stat-label">vs. mes anterior</div>
    </div>
   </div>
   <div class="chart-wrap">
    <div class="chart-title">Entregas por mes</div>
    <canvas id="ventasChart" height="220"></canvas>
   </div>
   <div class="chart-wrap">
    <div class="chart-title">Detalle mensual</div>
    <div id="ventas-list"></div>
   </div>
  </div>
 </body>
</html>
